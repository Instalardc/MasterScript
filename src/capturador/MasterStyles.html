<link
  href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap"
  rel="stylesheet">

<style>
  /* ═══════════════════════════════════════════════════════════
   1. VARIABLES GLOBALES
   ═══════════════════════════════════════════════════════════ */
  :root {
    /* Neón base */
    --n-blue: #2E86DE;
    --n-purple: #A55EEA;
    --n-green: #26DE81;
    --n-red: #FC5C65;
    --n-yellow: #FED330;

    /* Neón consola (intensos) */
    --c-blue: #00f2ff;
    --c-purple: #7000ff;
    --c-green: #00ff88;
    --c-pink: #ff00aa;

    /* Fondos */
    --bg-dark: #0a0a0b;
    --bg-darkblue: #00002a;
    --bg-darkpurple: #2a002a;
    --bg-midblue: #000054;

    /* Grises */
    --color-midgray: #7e7e7e;
    --color-semigray: #d2d2d2;
    --color-graywhite: #fcfcfc;

    /* Espaciado */
    --gap-xs: 4px;
    --gap-sm: 8px;
    --gap-md: 12px;
    --gap-lg: 20px;

    /* Radios */
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --radius-2xl: 24px;

  }

  /* ═══════════════════════════════════════════════════════════
   2. RESET
   ═══════════════════════════════════════════════════════════ */
  *,
  *::before,
  *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  input[type=number] {
    -moz-appearance: textfield;
  }

  /* ═══════════════════════════════════════════════════════════
   3. BODY
   ═══════════════════════════════════════════════════════════ */
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0F1419 0%, #00000f 80%);
    color: #fff;
    padding: 10px;
    font-size: 13px;
    position: relative;
    min-height: 100vh;
  }

  /* ═══════════════════════════════════════════════════════════
   4. CIRCUIT BACKGROUND
   ═══════════════════════════════════════════════════════════ */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(0, 242, 255, .03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 242, 255, .03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(90deg, transparent 15%, rgba(0, 100, 255, .4) 55%, transparent 90%),
      linear-gradient(90deg, transparent 30%, rgba(112, 0, 255, .3) 70%, transparent 80%),
      linear-gradient(0deg, transparent 40%, rgba(0, 100, 255, .4) 75%, transparent 100%),
      linear-gradient(0deg, transparent 15%, rgba(112, 0, 255, .3) 50%, transparent 95%),
      linear-gradient(45deg, transparent 30%, rgba(5, 102, 255, .1) 70%, transparent 85%),
      linear-gradient(-45deg, transparent 25%, rgba(112, 0, 255, .1) 55%, transparent 90%);
    background-size: 300% 2px, 300% 2px, 2px 300%, 2px 300%, 200% 200%, 200% 200%;
    background-position: 0% 20%, 0% 60%, 30% 0%, 70% 0%, 0% 0%, 100% 100%;
    background-repeat: no-repeat;
    opacity: .9;
    pointer-events: none;
    z-index: 0;
    animation: ms-circuit 6s linear infinite;
  }

  @keyframes ms-circuit {
    0% {
      background-position: 0% 20%, 0% 60%, 30% 0%, 70% 0%, 0% 0%, 100% 100%;
    }

    50% {
      background-position: 100% 20%, 100% 60%, 30% 100%, 70% 100%, 50% 50%, 50% 50%;
    }

    100% {
      background-position: 0% 20%, 0% 60%, 30% 0%, 70% 0%, 0% 0%, 100% 100%;
    }
  }

  .circuit-node {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--c-blue);
    box-shadow: 0 0 25px var(--c-blue), 0 0 30px var(--c-blue);
    pointer-events: none;
    z-index: 1;
    animation: ms-pulse-node 3s ease-in-out infinite;
  }

  @keyframes ms-pulse-node {

    0%,
    100% {
      opacity: .6;
      transform: scale(1);
    }

    50% {
      opacity: 1;
      transform: scale(1.5);
    }
  }


  /* ═══════════════════════════════════════════════════════════
   5. SCROLLBAR
   ═══════════════════════════════════════════════════════════ */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }

  ::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, .04);
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb {
    background: rgba(46, 134, 222, .45);
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: rgba(46, 134, 222, .7);
  }

  /* ═══════════════════════════════════════════════════════════
   6. CONTENEDORES
   ═══════════════════════════════════════════════════════════ */
  .container {
    max-width: 1180px;
    margin: 0 auto;
    border-radius: var(--radius-lg);
    border-left: 4px solid var(--n-blue);
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .main-container {
    position: relative;
    z-index: 5;
    max-width: 1400px;
    margin: 0 auto;
    padding: 2px;
    display: flex;
    flex-direction: column;
    gap: var(--gap-md);
  }

  /* ═══════════════════════════════════════════════════════════
   7. HEADER
   ═══════════════════════════════════════════════════════════ */
  .header {
    position: relative;
    z-index: 10;
    padding: 4px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid rgba(0, 242, 255, .45);
    background: rgba(10, 10, 11, .8);
    backdrop-filter: blur(10px);
  }

  .header-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, #00f2ff, #7000ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
  }

  .header-subtitle {
    font-size: 10px;
    font-weight: 300;
    color: rgba(0, 250, 200, .7);
    margin-top: 2px;
  }

  .header-badge {
    display: flex;
    align-items: center;
    gap: var(--gap-sm);
    padding: 4px 4px;
    border-radius: 20px;
    background: rgba(0, 255, 136, .08);
    border: 1px solid rgba(0, 255, 136, .55);
    font-size: 11px;
    color: var(--c-green);
  }

  .header-badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--c-green);
    box-shadow: 0 2px 8px var(--c-green);
    animation: ms-pulse-dot 2s ease-in-out infinite;
  }

  @keyframes ms-pulse-dot {

    0%,
    100% {
      opacity: 0.5;
      transform: scale(3);
    }

    33% {
      opacity: 1;
      transform: scale(0.2);
    }
  


    66% {
      opacity: 0.6;
      transform: scale(1);
    }
  }





  .logo-3d {
    font-family: 'Orbitron', sans-serif;
    display: inline-block;
    height: 20px;
    position: relative;
    overflow: visible;
  }

  .logo-metal-texture {
    font-family: 'Orbitron', sans-serif;
    font-weight: 100;
    font-size: 30px;
    letter-spacing: 0.5px;
    color: transparent;
    background-image: url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?q=80&w=1470&auto=format&fit=crop');
    background-size: 300%;
    background-position: 0% 50%;
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: metal-shine 7s infinite alternate linear;
    text-shadow: 1px 1px 0px rgba(255, 180, 255, 0.4), 2px 2px 2px rgba(120, 80, 255, 0.3);
    position: relative;
  }

  .logo-metal-texture span:nth-child(7) {
    font-size: 33px;
    color: #ff4b00 !important;
    -webkit-text-fill-color: #ff4b00 !important;
    text-shadow: 0 0 10px rgba(255, 75, 0, 0.7), 1px 1px 0px rgba(0, 0, 0, 0.7), 2px 2px 0px rgba(0, 0, 0, 0.5);
    position: relative;
    display: inline-block;
  }

  .logo-metal-texture span:nth-child(3)::after {
    content: """";
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    background: radial-gradient(circle, rgba(255, 75, 0, 1), transparent 70%);
    opacity: 0;
    animation: t-flash 7s infinite;
    z-index: -1;
    border-radius: 9px;
  }

  @keyframes metal-shine {
    0% {
      background-position: 0% 50%;
      filter: brightness(1.5) contrast(1);
    }

    70% {
      background-position: 70% 50%;
      filter: brightness(2.4) contrast(1.2);
    }

    75% {
      background-position: 75% 50%;
      filter: brightness(1.8) contrast(1.3);
    }

    80% {
      background-position: 80% 50%;
      filter: brightness(2.3) contrast(1.1);
    }

    90% {
      background-position: 90% 50%;
      filter: brightness(1.5) contrast(1.2);
    }

    100% {
      background-position: 100% 50%;
      filter: brightness(1) contrast(2);
    }
  }

  @keyframes t-flash {

    0%,
    72% {
      opacity: 0.8;
    }

    73% {
      opacity: 1.8;
      transform: scale(1.1);
    }

    76% {
      opacity: 1.3;
      transform: scale(1.05);
    }

    78% {
      opacity: 1.9;
      transform: scale(1.15);
    }

    96% {
      opacity: 0;
      transform: scale(2);
    }

    100% {
      opacity: 0;
    }
  }



  /* ═══════════════════════════════════════════════════════════
   8. GLASS
   ═══════════════════════════════════════════════════════════ */
  .glass {
    background: rgba(255, 255, 255, .08);
    border: 1px solid rgba(255, 255, 255, .15);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, .3);
  }

  .glass-dark {
    background: rgba(50, 45, 65, .9);
    backdrop-filter: blur(30px);
    border: 2px solid rgba(255, 255, 255, .08);
    border-radius: var(--radius-md);
    box-shadow: 0 8px 32px rgba(0, 0, 0, .3);
  }

  .glass-neon {
    background: rgba(255, 255, 255, .03);
    backdrop-filter: blur(12px);
    border: 2px solid rgba(255, 255, 255, .1);
    border-radius: var(--radius-xl);
  }

  /* ═══════════════════════════════════════════════════════════
   9. SIDEBAR GLOW
   ═══════════════════════════════════════════════════════════ */
 .sidebar-glow {
    position: relative;
    border: 3px solid transparent;
    box-shadow: inset 0 0 30px rgba(0, 242, 255, .1),
      0 0 40px rgba(0, 242, 255, .3), 0 0 60px rgba(112, 0, 255, .2);
    border-radius: var(--radius-2xl);
    overflow: hidden;
    padding: 2px;
    margin-bottom: 2px;
    max-width: 300px;
  }

  .sidebar-glow::before {
    content: '';
    position: relative;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(180deg,
        rgba(0, 242, 255, 0.05) 0%,
        rgba(112, 0, 255, 0.05) 100%);
    pointer-events: none;
    z-index: -1;
  }

  .sidebar-nav-item {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0px 2px;
    border-radius: 2px;
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow:
      inset 0 2px 0px rgba(100, 202, 255, 0.6),
      0 3px 2px rgba(0, 202, 0, 0.1),
      0 4px 2px rgba(72, 50, 255, 0.9);
  }

  .sidebar-nav-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 0;
    background: var(--c-blue);
    transition: height .3s ease;
    border-radius: 0 2px 2px 0.5;
  }

  .sidebar-nav-item:hover {
    background: rgba(0, 242, 255, 0.08);
    transform: translateX(-18px);
  }

  .sidebar-nav-item:hover::before {
    height: 90%;
  }

  .sidebar-icon {
    width: 22px;
    height: 18px;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
    background: rgba(0, 242, 255, .07);
    border: 1px solid rgba(0, 242, 255, .3);
    flex-shrink: 0;
  }

  /* ═══════════════════════════════════════════════════════════
   10. FORM GROUPS
   ═══════════════════════════════════════════════════════════ */
  .form-row-triple {
    display: grid;
    grid-template-columns: 2fr 2fr 1fr;
    gap: var(--gap-md);
    align-items: end;
    margin-bottom: 10px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .form-group label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, .65);
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .form-group input,
  .form-group select {
    background: rgba(255, 255, 255, .10);
    border: 0;
    border-left: 4px solid var(--n-blue);
    border-radius: var(--radius-md);
    padding: 8px 10px;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    width: 100%;
    transition: all .2s;
  }

  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    background: rgba(255, 255, 255, .16);
    box-shadow: 0 0 0 3px rgba(46, 134, 222, .15);
    border-left-color: var(--n-yellow);
  }

  .idcot-display {
    background: rgba(46, 134, 222, .18);
    border: 2px solid var(--n-blue);
    border-left: 4px solid var(--n-blue);
    border-radius: var(--radius-md);
    padding: 7px;
    text-align: center;
    font-size: 18px;
    font-weight: 800;
    color: var(--n-blue);
    letter-spacing: 2px;
    font-family: 'Orbitron', sans-serif;
  }

  /* ═══════════════════════════════════════════════════════════
   11. GRID HELPERS
   ═══════════════════════════════════════════════════════════ */
  .form-grid {
    display: grid;
    gap: 6px;
    padding-inline: 6px;
    padding-bottom: 2px;
  }

  .grid-1 {
    grid-template-columns: 1fr;
  }

  .grid-2 {
    grid-template-columns: 1fr 1fr;
  }

  .grid-3 {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .grid-4 {
    grid-template-columns: repeat(4, 1fr);
  }

  .grid-auto-2 {
    grid-template-columns: auto 1fr 1fr;
  }

  .align-center {
    align-items: center;
  }

  .full-width {
    grid-column: 1/-1;
  }

  .form-field input,
  .form-field select {
    width: 100%;
    border-radius: var(--radius-sm);
    font-size: 13px;
    padding: 3px 4px;
    margin: 2px;
    background: rgba(255, 255, 255, .10);
    border: 1px solid rgba(255, 255, 255, .15);
    color: #fff;
  }

  .form-field input:focus,
  .form-field select:focus {
    outline: none;
    border-color: var(--n-blue);
  }

  /* ═══════════════════════════════════════════════════════════
   12. SEARCH DROPDOWN
   ═══════════════════════════════════════════════════════════ */
  .search-wrapper {
    position: relative;
  }

  .resultadosbusqueda {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: #111827;
    border: 1px solid rgba(255, 255, 255, .2);
    border-radius: 6px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 9999;
    box-shadow: 0 6px 20px rgba(0, 0, 0, .6);
  }

  .resultadosbusqueda ul {
    list-style: none;
  }

  .resultadosbusqueda li {
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255, 255, 255, .06);
    transition: background .15s;
    font-size: 11px;
  }

  .resultadosbusqueda li:hover {
    background: rgba(46, 134, 222, .25);
  }

  .resultadosbusqueda li:last-child {
    border-bottom: none;
  }

  .resultadosbusqueda strong {
    color: var(--n-blue);
  }

  .resultadosbusqueda.no-coincidencias {
    background: linear-gradient(to right, #5a0d0d, #8b0000);
  }

/* ═══════════════════════════════════════════════════════════
   13. TABLA CAPTURADOR
   ═══════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════
   ESTILO CUADRÍCULA / PLANO
   ═══════════════════════════════════════════════════════════ */

/* 1. Contenedor base (Fila y Encabezado) */
.table-header,
.fila-capturador {
  display: grid;
  /* Mantenemos tu estructura de columnas original */
  grid-template-columns: 20px 30px 30px 1fr 1fr 60px 60px 50px 40px repeat(8, 23px) 20px;
  align-items: stretch; /* Estira los hijos para que las líneas verticales sean continuas */
  border: 1px solid var(--n-blue); /* Borde exterior */
  background: rgba(0, 0, 0, 0.5);
  margin-bottom: -1px; /* Solapa bordes para que no se vean dobles entre filas */
}

/* 2. Divisiones Verticales (Líneas de la cuadrícula) */
/* Aplicamos borde derecho a cada celda excepto a la última */
.table-header > div,
.fila-capturador > div,
.fila-capturador > input,
.fila-capturador > textarea,
.fila-capturador > button {
  border-right: 1px solid var(--n-blue); 
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 2px;
  box-sizing: border-box;
}

/* Eliminar borde de la última celda de cada fila */
.table-header > div:last-child,
.fila-capturador > *:last-child {
  border-right: none;
}

/* 3. Limpieza de Inputs y Textareas */
/* Para que parezca que escribes sobre el "papel" del plano */
.fila-capturador .field {
  background: transparent !important;
  border: none !important; /* Quitamos sus bordes propios */
  color: #fff;
  font-size: 10px;
  width: 100%;
  height: 100%;
  text-align: center;
  outline: none;
}

/* Resalte al hacer foco en una celda */
.fila-capturador .field:focus {
  background: rgba(0, 255, 255, 0.05) !important;
}

/* 4. Ajustes específicos para tipos de datos */
.table-header {
  background: rgba(20, 20, 40, 0.8);
  border-bottom: 2px solid var(--n-purple);
  font-weight: bold;
  text-transform: uppercase;
}

/* Estilo para m2 y ID que son solo lectura */
.m2-fila, .idlin-fila {
  font-weight: bold;
  color: var(--n-yellow);
}



.table-header,
.fila-capturador {
  display: grid;
  grid-template-columns: 20px 30px 30px 1fr 1fr 60px 60px 50px 40px repeat(8, 23px) 20px;
  align-items: center; color: #fff; font-size: 9px; text-align: center; border-color: var(--n-blue); border-radius: 2px;}
.table-header { font-size: 9px; font-weight: 400; border-bottom-color: var(--n-purple); border-top-color: var(--n-purple);  border-left-color: var(--n-blue); border-right-color: var(--n-blue); color: #fff; letter-spacing: .5px; text-align: center; border-radius: 1px;}
    .fila-capturador { margin-bottom: 1px; }
/**   Todos los inputs y textarea de la tabla — una sola clase  */ 
    .fila-capturador .field { border: none; width: 100%; resize: none; transition: background .15s, box-shadow .15s; border-bottom-color: var(--n-purple); border-top-color: var(--n-purple);  border-left-color: var(--n-blue);  border-right-color: var(--n-blue); border-radius: 1px;}

    .fila-capturador textarea.field { height: 21px; overflow: hidden; }
/**   Checks  */ 
    .fila-capturador input[type="checkbox"] { cursor: pointer; display: block; margin: auto;}
    .fila-capturador .check-fila { accent-color: var(--n-yellow); }
/**   Labels de solo lectura  */ 
    .fila-capturador .idlin-fila { border-bottom-color: var(--n-purple); border-top-color: var(--n-purple);  border-left-color: var(--n-blue);  border-right-color: var(--n-blue);}
    .fila-capturador .m2-fila { border-bottom-color: var(--n-purple); border-top-color: var(--n-purple);  border-left-color: var(--n-blue);  border-right-color: var(--n-blue);}
/**   Botón eliminar  */ 
    .fila-capturador .btn-eliminar { background: none; cursor: pointer; display: block; margin: auto; opacity: .5; transition: opacity .15s, transform .15s; border: 1px solid rgba(150, 200, 255, .5); border-radius: 3px;}
    .fila-capturador .btn-eliminar:hover { opacity: 1; transform: scale(1.3); }
/**   Chips adjuntos  */ 
    .adj-zona { grid-column: 1 / -1; display: flex; flex-wrap: wrap;}
  /* ═══════════════════════════════════════════════════════════
   14. DATA TABLE
   ═══════════════════════════════════════════════════════════ */
  .data-table {
